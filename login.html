<!DOCTYPE html>
<html lang="en-AU">
<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <title>Admin Portal Cielo House</title>
 <link rel="preconnect" href="https://fonts.googleapis.com" />
 <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
 <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
 <style>
 *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

 body {
 font-family: 'Poppins', sans-serif;
 background: #2B317B;
 min-height: 100vh;
 display: flex;
 align-items: center;
 justify-content: center;
 padding: 2rem;
 }

 .login-card {
 background: #ffffff;
 border-radius: 16px;
 padding: 3rem 3.5rem;
 width: 100%;
 max-width: 420px;
 box-shadow: 0 24px 80px rgba(0,0,0,0.25);
 }

 .login-logo {
 display: block;
 height: 60px;
 width: auto;
 margin: 0 auto 2.5rem;
 }

 .login-title {
 font-family: 'Bebas Neue', sans-serif;
 font-size: 2rem;
 color: #2B317B;
 letter-spacing: 0.04em;
 text-align: center;
 margin-bottom: 0.4rem;
 }

 .login-sub {
 font-size: 0.8rem;
 color: rgba(43,49,123,0.55);
 text-align: center;
 letter-spacing: 0.06em;
 text-transform: uppercase;
 margin-bottom: 2.5rem;
 }

 .field {
 margin-bottom: 1.25rem;
 }

 label {
 display: block;
 font-size: 0.72rem;
 font-weight: 600;
 letter-spacing: 0.12em;
 text-transform: uppercase;
 color: #2B317B;
 margin-bottom: 0.5rem;
 }

 input {
 width: 100%;
 padding: 0.875rem 1.25rem;
 border: 1.5px solid rgba(43,49,123,0.2);
 border-radius: 8px;
 font-family: 'Poppins', sans-serif;
 font-size: 0.9rem;
 color: #2B317B;
 background: #f8f9ff;
 outline: none;
 transition: border-color 0.2s;
 }

 input:focus {
 border-color: #2B317B;
 background: #ffffff;
 }

 .btn-login {
 width: 100%;
 padding: 1rem;
 background: #2B317B;
 color: #ffffff;
 border: none;
 border-radius: 8px;
 font-family: 'Poppins', sans-serif;
 font-size: 0.8rem;
 font-weight: 600;
 letter-spacing: 0.15em;
 text-transform: uppercase;
 cursor: pointer;
 margin-top: 0.5rem;
 transition: background 0.2s, transform 0.1s;
 }

 .btn-login:hover { background: #1e2460; }
 .btn-login:active { transform: scale(0.98); }

 .error-msg {
 background: #fff0f0;
 color: #c0392b;
 border: 1px solid #f5c6cb;
 border-radius: 8px;
 padding: 0.75rem 1rem;
 font-size: 0.82rem;
 margin-bottom: 1.25rem;
 display: none;
 text-align: center;
 }

 .error-msg.visible { display: block; }

 .login-footer {
 text-align: center;
 font-size: 0.72rem;
 color: rgba(43,49,123,0.4);
 margin-top: 2rem;
 letter-spacing: 0.05em;
 }
 </style>
</head>
<body>

 <div class="login-card">
 <img src="images/new-logo/CH_Logo_Horizontal_Blue-on-White.png" alt="Cielo House" class="login-logo" />
 <h1 class="login-title">Team Access</h1>
 <p class="login-sub">Admin Dashboard</p>

 <div class="error-msg" id="error-msg">Incorrect username or password. Try again.</div>

 <form id="login-form" onsubmit="handleLogin(event)">
 <div class="field">
 <label for="username">Username</label>
 <input type="text" id="username" name="username" placeholder="Enter username" autocomplete="username" required />
 </div>
 <div class="field">
 <label for="password">Password</label>
 <input type="password" id="password" name="password" placeholder="Enter password" autocomplete="current-password" required />
 </div>
 <button type="submit" class="btn-login">Sign In →</button>
 </form>

 <p class="login-footer">Cielo House | Internal Use Only</p>
 </div>

 <script>
 // Redirect to dashboard if already logged in
 if (sessionStorage.getItem('ch_auth') === 'true') {
 window.location.href = 'dashboard.html';
 }

 // Credentials change these to update login details
 const CREDENTIALS = {
 username: 'cielo',
 password: 'house2025'
 };

 function handleLogin(e) {
 e.preventDefault();
 const user = document.getElementById('username').value.trim();
 const pass = document.getElementById('password').value;
 const error = document.getElementById('error-msg');

 if (user === CREDENTIALS.username && pass === CREDENTIALS.password) {
 sessionStorage.setItem('ch_auth', 'true');
 window.location.href = 'dashboard.html';
 } else {
 error.classList.add('visible');
 document.getElementById('password').value = '';
 document.getElementById('password').focus();
 }
 }
 </script>

</body>
</html>
