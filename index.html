<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon | Cielo House Sports &amp; Experiential</title>
  <meta name="description" content="Cielo House Sports and Experiential. Our new digital house is on the way. Follow us on Instagram and LinkedIn." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #2B317B;
    }

    /* Full-screen background image */
    .bg {
      position: fixed;
      inset: 0;
      background-repeat: no-repeat;
      background-size: cover;
      background-position: center center;
      background-image: url('images/coming-soon-page/Desktop%20New%20Background.jpg');
    }

    /* Mobile image */
    @media (max-width: 768px) {
      .bg {
        background-image: url('images/coming-soon-page/Mobile%20New%20Background.jpg');
        background-position: top center;
      }
    }

    /* Button container — positioned over the blue wave area */
    .btns-wrap {
      position: fixed;
      bottom: 10%;
      left: 4%;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.75rem;
      z-index: 10;
      animation: fadeUp 0.9s cubic-bezier(.22,1,.36,1) 0.3s both;
    }

    /* Buttons sit side by side on desktop */
    .btns-row {
      display: flex;
      flex-direction: row;
      gap: 1rem;
      align-items: center;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Button — matching site style (pill shape = 9999px as per main site) */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.85rem 1.6rem;
      border-radius: 9999px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.2s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s ease, background 0.18s ease, color 0.18s ease;
      white-space: nowrap;
    }

    .btn:hover {
      transform: translateY(-3px);
    }

    /* Primary — white background, navy text (readable on dark blue) */
    .btn--primary {
      background: #ffffff;
      color: #2B317B;
      box-shadow: 0 6px 24px rgba(0,0,0,0.2);
    }

    .btn--primary:hover {
      background: #eef1fb;
      box-shadow: 0 12px 36px rgba(0,0,0,0.28);
    }

    /* Secondary — outlined white */
    .btn--outline {
      background: transparent;
      color: #ffffff;
      border-color: rgba(255,255,255,0.7);
      box-shadow: 0 6px 24px rgba(0,0,0,0.15);
    }

    .btn--outline:hover {
      background: rgba(255,255,255,0.1);
      border-color: #ffffff;
      box-shadow: 0 12px 36px rgba(0,0,0,0.22);
    }

    .btn svg {
      flex-shrink: 0;
      width: 16px;
      height: 16px;
    }

    .btns-label {
      width: 100%;
      font-size: 0.82rem;
      font-weight: 400;
      color: rgba(255,255,255,0.85);
      line-height: 1.65;
      margin-bottom: 0.5rem;
      text-align: left;
    }

    /* Mobile: centered in the blue area */
    @media (max-width: 768px) {
      .btns-wrap {
        bottom: 7%;
        left: 0;
        right: 0;
        align-items: center;
        width: 100%;
        padding: 0 2rem;
      }

      .btns-label {
        text-align: center;
        font-size: 0.8rem;
        max-width: 300px;
      }

      .btns-row {
        flex-direction: column;
        align-items: center;
        width: 100%;
        gap: 0.75rem;
      }

      .btn {
        width: 100%;
        max-width: 340px;
        justify-content: center;
        font-size: 0.82rem;
        padding: 1rem 1.4rem;
      }
    }

    /* Small mobile */
    @media (max-width: 420px) {
      .btns-wrap {
        bottom: 14%;
      }
    }
  </style>
</head>
<body>

  <div class="bg" aria-hidden="true"></div>

  <div class="btns-wrap">
    <p class="btns-label">In the meantime, follow us to see<br>what we are delivering on the ground.</p>
    <div class="btns-row">
      <a
        href="https://www.instagram.com/cielohouse_/"
        target="_blank"
        rel="noopener noreferrer"
        class="btn btn--primary"
        aria-label="Follow Cielo House on Instagram"
      >
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">

      <a

        target="_blank"
        rel="noopener noreferrer"
        class="btn btn--outline"
        aria-label="Connect with Cielo House on LinkedIn"
      >
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
        </svg>
        Connect on LinkedIn
      </a>
    </div>
  </div>

<script src="/tracking.js"></script>
</body>
</html>
